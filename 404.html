<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="robots" content="noindex">
<title>Redirecting… worldbestech.co.kr</title>
<link rel="canonical" href="https://www.worldbestech.com/">
<!-- GitHub Pages는 알 수 없는 모든 경로에 이 404.html을 서빙 → apex 하위 경로 전부 여기서 리다이렉트 -->
<script>
  (function () {
    var target = 'https://www.worldbestech.com' +
      window.location.pathname + window.location.search + window.location.hash;
    window.location.replace(target);
  })();
</script>
<meta http-equiv="refresh" content="0; url=https://www.worldbestech.com/">
</head>
<body>
<p>이 페이지는 <a href="https://www.worldbestech.com/">www.worldbestech.com</a>로 이동합니다.</p>
</body>
</html>
